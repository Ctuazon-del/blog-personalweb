<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post | BrightPath Blog</title>
  <link rel="icon" type="image/jpeg" href="FullLogo_NoBuffer.jpg" />
  <link rel="stylesheet" href="styles.css?v=20260606-grey-light-bg" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">BrightPath</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a class="active" href="blog.html">Blog</a>
        <a href="publish.html">Publish</a>
        <a href="contact.html">Contact</a>
      </nav>
      <button class="theme-toggle" type="button" aria-label="Turn dark mode on" aria-pressed="false">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-text">Dark</span>
      </button>
    </div>
  </header>

  <main class="container page-content">
    <article class="blog-post" id="post-content"></article>

    <section class="content-block comments-section">
      <p class="section-label">Reader comments</p>
      <h2>Join the discussion</h2>
      <div class="comment-list" id="comment-list"></div>
      <form class="comment-form" id="comment-form">
        <label>
          Name
          <input type="text" id="comment-name" placeholder="Your name" required />
        </label>
        <label>
          Comment
          <textarea id="comment-message" rows="4" placeholder="Share your thoughts" required></textarea>
        </label>
        <button class="btn" type="submit">Post comment</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; 2026 BrightPath. Practical writing for web creators.</p>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="blog.html">Blog</a>
      </nav>
    </div>
  </footer>

  <script>
    const savedTheme = localStorage.getItem('brightpath-theme');
    if (savedTheme === 'dark') document.documentElement.dataset.theme = 'dark';
    document.querySelectorAll('.theme-toggle').forEach((button) => {
      const updateToggle = () => {
        const isDark = document.documentElement.dataset.theme === 'dark';
        button.setAttribute('aria-pressed', String(isDark));
        button.setAttribute('aria-label', isDark ? 'Turn dark mode off' : 'Turn dark mode on');
        button.querySelector('.toggle-text').textContent = isDark ? 'Light' : 'Dark';
      };
      button.addEventListener('click', () => {
        const isDark = document.documentElement.dataset.theme === 'dark';
        if (isDark) {
          delete document.documentElement.dataset.theme;
          localStorage.setItem('brightpath-theme', 'light');
        } else {
          document.documentElement.dataset.theme = 'dark';
          localStorage.setItem('brightpath-theme', 'dark');
        }
        updateToggle();
      });
      updateToggle();
    });
  </script>
  <script src="posts-data.js?v=20260607-fast-online"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const postContent = document.getElementById('post-content');
    let currentPost;

    async function loadPost() {
      currentPost = await BlogStore.getPost(params.get('id'));
      document.title = `${currentPost.title} | BrightPath Blog`;
      postContent.innerHTML = `
        <p class="eyebrow">${BlogStore.escape(currentPost.categoryLabel)}</p>
        <h1>${BlogStore.escape(currentPost.title)}</h1>
        <p class="meta">${BlogStore.escape(currentPost.date)} À ${BlogStore.escape(currentPost.readTime)}</p>
        <div class="post-banner">
          <img src="${BlogStore.escape(currentPost.image)}" alt="${BlogStore.escape(currentPost.imageAlt)}" />
        </div>
        <p>${BlogStore.escape(currentPost.excerpt)}</p>
        ${currentPost.content.map((section) => `
          <h2>${BlogStore.escape(section.heading)}</h2>
          <p>${BlogStore.escape(section.body)}</p>
        `).join('')}
        <div class="post-actions">
          <a class="btn" href="blog.html">Back to blog</a>
          <a class="btn btn-secondary" href="contact.html">Ask a question</a>
        </div>
      `;
      renderComments();
    }

    async function getComments() {
      try {
        const response = await fetch(`api/comments.php?postId=${encodeURIComponent(currentPost.id)}`, { cache: 'no-store' });
        if (!response.ok) throw new Error('Could not load comments');
        return await response.json();
      } catch (error) {
        return [];
      }
    }

    async function renderComments() {
      const commentList = document.getElementById('comment-list');
      const comments = await getComments();
      commentList.innerHTML = comments.map((comment) => `
        <article>
          <strong>${BlogStore.escape(comment.name)}</strong>
          <p>${BlogStore.escape(comment.message)}</p>
        </article>
      `).join('');
    }

    document.getElementById('comment-form').addEventListener('submit', async function(event) {
      event.preventDefault();
      const name = document.getElementById('comment-name').value.trim();
      const message = document.getElementById('comment-message').value.trim();
      if (!name || !message || !currentPost) return;

      await fetch('api/comments.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ postId: currentPost.id, name, message })
      });
      this.reset();
      renderComments();
    });

    loadPost();
  </script>
</body>
</html>
